<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Events Demo</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #667eea, #764ba2, #4facfe, #00f2fe);
            background-size: 400% 400%;
            animation: bg 10s infinite ease;
        }

        @keyframes bg {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .card {
            width: 500px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, .15);
            backdrop-filter: blur(15px);
            text-align: center;
            color: white;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .4);
        }

        h1 {
            margin-bottom: 20px;
            transition: .3s;
        }

        input {
            width: 90%;
            padding: 12px;
            border: none;
            outline: none;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 16px;
        }

        button {
            padding: 12px 18px;
            margin: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-size: 16px;
            transition: .3s;
        }

        .blue {
            background: #007bff;
        }

        .green {
            background: #28a745;
        }

        .orange {
            background: #ff9800;
        }

        button:hover {
            transform: scale(1.05);
        }

        #output {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, .2);
            min-height: 40px;
        }

        .success {
            color: #00ff88;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1 id="heading" onmouseover="mouseOver()" onmouseout="mouseOut()">
            🎯 JavaScript Events
        </h1>

        <input type="text" id="textBox" placeholder="Type your name..." onkeyup="showText()" onfocus="focusInput()"
            onblur="blurInput()">

        <div id="output">
            Start typing...
        </div>

        <button class="blue" onclick="clickMe()">
            Click Me
        </button>

        <button class="green" ondblclick="doubleClick()" id="doubleBtn">
            Double Click
        </button>

        <button class="orange" id="eventBtn">
            Event Listener
        </button>

    </div>

    <script>

        // Click Event
        function clickMe() {
            document.getElementById("output").innerHTML =
                "<span class='success'>✅ Button Clicked Successfully!</span>";
        }

        // Double Click Event
        function doubleClick() {
            document.getElementById("doubleBtn").innerHTML =
                "✔ Done!";
        }

        // Mouse Over
        function mouseOver() {
            document.getElementById("heading").style.color = "yellow";
        }

        // Mouse Out
        function mouseOut() {
            document.getElementById("heading").style.color = "white";
        }

        // Keyboard Event
        function showText() {
            let text = document.getElementById("textBox").value;
            document.getElementById("output").innerHTML =
                "👋 Hello, <b>" + text + "</b>";
        }

        // Focus Event
        function focusInput() {
            document.getElementById("output").innerHTML =
                "✏️ Start typing...";
        }

        // Blur Event
        function blurInput() {
            document.getElementById("output").innerHTML +=
                "<br>✔ Input Lost Focus";
        }

        // Event Listener
        document.getElementById("eventBtn")
            .addEventListener("click", function () {

                document.getElementById("output").innerHTML =
                    "<span class='success'>🎉 addEventListener Executed!</span>";

            });

    </script>

</body>

</html>
